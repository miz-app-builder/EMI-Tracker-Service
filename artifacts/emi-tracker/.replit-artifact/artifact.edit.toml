kind = "web"
previewPath = "/"
title = "EMI Tracker"
version = "1.0.0"
id = "artifacts/emi-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 3000

[services.development]
run = "pnpm --filter @workspace/emi-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/emi-tracker", "run", "build" ]
publicDir = "artifacts/emi-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "3000"
BASE_PATH = "/"
